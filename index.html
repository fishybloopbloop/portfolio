<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zara Khan — Digital Marketing</title>
<meta name="description" content="Zara Khan is a digital marketer crafting purposeful visuals, brand identities, and digital experiences.">
<meta property="og:title" content="Zara Khan — Digital Marketing">
<meta property="og:description" content="Crafting purposeful visuals, brand identities, and digital experiences.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0efed;
  --grid:#00000009;
  --menubar-bg:rgba(236,233,229,0.88);
  --dock-bg:rgba(255,255,255,0.48);
  --text:#141412;
  --muted:#403f3a;
  --faint:#726f66;
  --accent:#2c5c8a;
  --folder-blue:#4a90d9;
  --win-bg:#f5f4f2;
  --win-chrome:#e8e6e2;
  --border:rgba(0,0,0,0.1);
  --shadow-icon:0 2px 8px rgba(0,0,0,0.18);
  --shadow-win:0 24px 80px rgba(0,0,0,0.28),0 8px 24px rgba(0,0,0,0.16),0 0 0 0.5px rgba(0,0,0,0.12);
  --radius-win:12px;
  --transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
html,body{width:100%;height:100%;overflow:hidden;user-select:none;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  position:relative;
}

/* ── GRID BACKGROUND ── */
.desktop-grid{
  position:fixed;inset:0;
  background-image:url('background.jpg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:0;
}

/* ── MENU BAR ── */
.menubar{
  position:fixed;top:0;left:0;right:0;height:28px;
  background:var(--menubar-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.12);
  display:flex;align-items:center;
  padding:0 14px;justify-content:space-between;
  z-index:1000;font-size:12.5px;
}
.menubar-left{display:flex;align-items:center;gap:0;}
.apple-logo{
  display:flex;align-items:center;
  width:14px;height:16px;
  margin-right:14px;cursor:default;
  color:var(--text);
}
.apple-logo svg{width:100%;height:100%;display:block;}
.menu-brand{font-weight:600;color:var(--text);margin-right:18px;cursor:default;}
.menu-item{
  color:var(--text);padding:0 10px;height:28px;
  display:flex;align-items:center;cursor:default;
  font-size:13px;border-radius:4px;
  transition:background var(--transition);
}
.menu-item:hover{background:rgba(0,0,0,0.07);}
.menubar-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);}
.menu-icons{display:flex;align-items:center;gap:11px;}
.mi{
  display:flex;align-items:center;justify-content:center;
  width:16px;height:16px;
  color:var(--text);
  opacity:0.85;
}
.mi svg{width:100%;height:100%;display:block;}
.mi-siri{width:15px;height:15px;}
#clock{font-size:12px;color:var(--text);min-width:160px;text-align:right;}

/* ── DESKTOP ── */
.desktop{
  position:fixed;
  top:28px;left:0;right:0;
  bottom:0;
  z-index:1;
  overflow:hidden;
}

/* ── DESKTOP ICONS (draggable) ── */
.desk-icon{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:default;
  width:80px;
  z-index:10;
  transition:filter var(--transition);
}
.desk-icon:hover .icon-img{filter:brightness(1.08);}
.desk-icon.selected .icon-label{
  background:#2c5c8a;color:#fff;border-radius:3px;
}
.desk-icon.dragging{z-index:500;opacity:0.85;}
.icon-img{
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  filter:drop-shadow(var(--shadow-icon));
  transition:transform 0.1s ease;
  pointer-events:none;
}
.desk-icon:active .icon-img{transform:scale(0.93);}
.icon-label{
  font-size:12.5px;color:var(--text);
  text-align:center;line-height:1.3;
  padding:1px 4px;
  max-width:80px;
  text-shadow:0 1px 2px rgba(255,255,255,0.6);
  pointer-events:none;
}

/* ── STICKY NOTE ── */
.sticky{
  position:absolute;
  top:48px;left:20px;
  width:250px;
  background:linear-gradient(175deg,#fdf3a0,#f6e685);
  border:0.5px solid rgba(180,160,50,0.32);
  border-radius:2px 8px 8px 2px;
  padding:14px 14px 16px;
  box-shadow:2px 3px 12px rgba(0,0,0,0.12),0 1px 0 rgba(255,255,255,0.5) inset;
  z-index:10;
  cursor:default;
  font-size:14px;
  line-height:1.65;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;
  transform-origin:8% 12%;
}
.sticky:hover{
  transform:scale(1.06) rotate(-3deg);
  box-shadow:6px 12px 26px rgba(0,0,0,0.2),0 1px 0 rgba(255,255,255,0.5) inset;
}
.sticky.dragging{transition:none;}
.sticky-title{font-weight:700;font-size:14px;margin-bottom:8px;color:#2c2a00;}
.sticky-item{color:#2c2a00;display:block;}
.sticky-item.done{text-decoration:line-through;color:#736e00;}

/* ── WINDOWS ── */
.win-overlay{
  position:fixed;inset:0;z-index:800;
  display:none;pointer-events:none;
}
.win-overlay.has-windows{display:block;}

.window{
  position:absolute;
  background:var(--win-bg);
  border-radius:var(--radius-win);
  box-shadow:var(--shadow-win);
  min-width:520px;min-height:340px;
  display:flex;flex-direction:column;
  overflow:hidden;
  pointer-events:all;
  transform-origin:center center;
  animation:winOpen 0.22s cubic-bezier(0.34,1.46,0.64,1) forwards;
}
@keyframes winOpen{
  from{opacity:0;transform:scale(0.88);}
  to{opacity:1;transform:scale(1);}
}
.window.closing{
  animation:winClose 0.16s ease forwards;
}
@keyframes winClose{
  to{opacity:0;transform:scale(0.92);}
}

/* Window chrome / title bar */
.win-chrome{
  height:40px;min-height:40px;
  background:var(--win-chrome);
  border-bottom:0.5px solid rgba(0,0,0,0.1);
  display:flex;align-items:center;
  padding:0 14px;
  gap:8px;
  cursor:default;
  flex-shrink:0;
  position:relative;
  border-radius:var(--radius-win) var(--radius-win) 0 0;
}
.win-btn{
  width:12px;height:12px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:0.5px solid rgba(0,0,0,0.2);
  cursor:pointer;flex-shrink:0;
  position:relative;font-size:0;
  transition:filter 0.1s;
}
.win-btn:hover{filter:brightness(0.88);}
.win-btn-close{background:#ff5f57;border-color:#e0443e;}
.win-btn-min  {background:#febc2e;border-color:#d4a017;}
.win-btn-max  {background:#28c840;border-color:#1aab29;}
.win-btn-close::before,.win-btn-close::after{
  content:'';position:absolute;
  width:6px;height:0.5px;
  background:rgba(0,0,0,0.4);
  border-radius:1px;
  opacity:0;transition:opacity 0.1s;
}
.win-btn-close::before{transform:rotate(45deg);}
.win-btn-close::after{transform:rotate(-45deg);}
.win-btn-close:hover::before,.win-btn-close:hover::after{opacity:1;}

.win-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:13px;font-weight:500;color:var(--muted);
  white-space:nowrap;pointer-events:none;
}
/* win-toolbar removed */

/* Window content */
.win-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:24px;
  display:flex;flex-direction:column;gap:16px;
}
.win-body::-webkit-scrollbar{width:6px;}
.win-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px;}
.win-body-flush{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
}

/* Finder-style sidebar + content */
.win-finder{display:flex;flex:1;overflow:hidden;}
.win-sidebar{
  width:160px;min-width:160px;
  background:#e8e5e0;
  border-right:0.5px solid rgba(0,0,0,0.1);
  padding:12px 0;display:flex;flex-direction:column;gap:2px;
}
.sidebar-section{font-size:10.5px;font-weight:600;color:var(--faint);padding:6px 14px 2px;letter-spacing:0.06em;text-transform:uppercase;}
.sidebar-item{
  font-size:12.5px;color:var(--muted);
  padding:5px 14px;cursor:default;
  display:flex;align-items:center;gap:7px;
  border-radius:5px;margin:0 4px;
  transition:background 0.1s;
}
.sidebar-item:hover{background:rgba(0,0,0,0.07);}
.sidebar-item.active{background:rgba(44,92,138,0.15);color:var(--accent);}
.sidebar-icon{font-size:13px;}
.win-content{flex:1;overflow-y:auto;padding:20px;}
.win-content::-webkit-scrollbar{width:6px;}
.win-content::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px;}

/* Files inside window */
.file-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:8px;
}
.file-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border-radius:6px;cursor:default;
  transition:background 0.12s;
}
.file-item:hover{background:rgba(0,0,0,0.06);}
.file-item-icon{font-size:36px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));}
.file-item-name{font-size:12px;color:var(--text);text-align:center;line-height:1.3;max-width:88px;}

/* ── PROJECT WINDOW (folder-style file view) ── */
.project-header{
  padding:18px 24px 14px;
  border-bottom:0.5px solid rgba(0,0,0,0.1);
  flex-shrink:0;
}
.project-header h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;}
.project-header p{font-size:12.5px;color:var(--muted);}
.project-files{
  display:flex;flex-wrap:wrap;gap:36px;
  padding:32px 28px;
  flex:1;overflow-y:auto;min-height:0;
  align-content:flex-start;
}
.project-file{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  width:110px;cursor:pointer;
}
.project-file:hover{opacity:0.82;}
.project-file-name{font-size:13.5px;color:var(--text);text-align:center;line-height:1.3;}

.pf-folder{font-size:58px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.18));}

.pf-video{
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#4d4d4d,#161616 72%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.28);
}
.pf-video::after{
  content:'';
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-left:14px solid #5fc9e8;
  margin-left:4px;
}

.pf-txt{
  width:46px;height:58px;background:#fdfdfc;
  border-radius:2px 9px 2px 2px;
  box-shadow:0 2px 7px rgba(0,0,0,0.16);
  position:relative;display:flex;flex-direction:column;
  padding:8px 6px;gap:4px;
}
.pf-txt span{display:block;height:2px;background:#dcd8d0;border-radius:1px;}
.pf-txt span:nth-child(1){width:75%;}
.pf-txt span:nth-child(2){width:95%;}
.pf-txt span:nth-child(3){width:60%;}
.pf-txt::after{
  content:'';position:absolute;top:0;right:0;
  border-width:0 9px 9px 0;border-style:solid;
  border-color:transparent #e5e1d9 transparent transparent;
}
.pf-thumb{
  position:absolute;bottom:5px;right:4px;
  width:13px;height:13px;border-radius:2px;
  background:linear-gradient(135deg,#e8895f,#c9503a);
}

/* Text-file viewer window */
.txt-viewer{
  padding:26px 30px;font-size:15px;line-height:1.75;
  color:var(--text);white-space:pre-wrap;
  overflow-y:auto;flex:1;min-height:0;
}
.photo-placeholder{
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(160deg,#e4e1db,#cfccc4);
}
.photo-placeholder-icon{font-size:64px;opacity:0.55;}
.photo-placeholder-text{font-size:13px;color:var(--muted);font-weight:500;}
.txt-viewer::-webkit-scrollbar{width:6px;}
.txt-viewer::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px;}

/* About / page content inside windows */
.win-page{padding:28px 32px;}
.win-page h1{
  font-family:'Instrument Serif',serif;
  font-size:32px;font-style:italic;
  margin-bottom:12px;line-height:1.15;
}
.win-page h2{font-size:15px;font-weight:600;margin-bottom:8px;margin-top:20px;color:var(--text);}
.win-page p{font-size:15px;line-height:1.75;color:var(--muted);margin-bottom:8px;}
.win-page .tag-row{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0;}
.win-tag{font-size:11.5px;padding:4px 10px;border-radius:20px;background:#e8e5e0;color:var(--muted);border:0.5px solid rgba(0,0,0,0.1);}
.skill-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.skill-chip{font-size:11.5px;padding:4px 10px;border-radius:6px;background:#ddd9d2;color:var(--muted);}
.contact-row{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.contact-link{font-size:13.5px;color:var(--accent);text-decoration:none;}
.contact-link:hover{text-decoration:underline;}

/* Resources page */
.resource-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.resource-row{
  display:flex;align-items:center;gap:12px;
  background:#eceae6;border-radius:8px;
  padding:10px 14px;
  border:0.5px solid rgba(0,0,0,0.07);
}
.resource-row-icon{font-size:22px;flex-shrink:0;}
.resource-row-text .rname{font-size:14px;font-weight:500;color:var(--text);}
.resource-row-text .rdesc{font-size:12.5px;color:var(--faint);}

/* Archive grid */
.archive-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.archive-cell{
  aspect-ratio:1;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;
  color:rgba(0,0,0,0.35);border:0.5px dashed rgba(0,0,0,0.15);
  background:#e8e5e0;
  cursor:default;
  transition:background 0.15s;
}
.archive-cell:hover{background:#ddd9d2;}
.archive-cell span{font-size:11px;font-style:normal;font-family:'Inter',sans-serif;color:var(--faint);}

/* ── DOCK ── */
.dock-wrap{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  z-index:900;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.dock{
  background:var(--dock-bg);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:0.5px solid rgba(255,255,255,0.65);
  border-bottom-color:rgba(0,0,0,0.1);
  border-radius:20px;
  padding:6px 12px 4px;
  display:flex;align-items:flex-end;gap:5px;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.07),0 8px 32px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.55);
}
.dock-item{
  display:flex;flex-direction:column;align-items:center;
  position:relative;cursor:pointer;
  transition:transform var(--transition);
  padding-bottom:2px;
}
.dock-item:hover{transform:translateY(-10px) scale(1.2);}
.dock-item:hover .dock-tip{opacity:1;transform:translateX(-50%) translateY(0);}
.dock-icon-img{
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  transition:transform var(--transition);
}
.dock-icon-img img{
  width:100%;height:100%;
  object-fit:contain;
  pointer-events:none;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}
.dock-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(0,0,0,0.45);
  margin-top:2px;
  opacity:0;transition:opacity var(--transition);
}
.dock-item.open .dock-dot{opacity:1;}
.dock-divider{
  width:0.5px;height:42px;margin:0 3px 6px;
  background:rgba(0,0,0,0.18);border-radius:1px;
}
.dock-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) translateY(4px);
  background:rgba(30,30,30,0.82);color:#fff;
  font-size:11.5px;font-weight:500;
  padding:3px 9px;border-radius:6px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity 0.14s,transform 0.14s;
  backdrop-filter:blur(4px);
}
.dock-tip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:rgba(30,30,30,0.82);
}

/* ── FORM ── */
.win-form{display:flex;flex-direction:column;gap:10px;}
.form-label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px;}
.form-input,.form-textarea{
  width:100%;padding:9px 12px;
  border:0.5px solid rgba(0,0,0,0.2);
  border-radius:7px;font-size:13.5px;font-family:inherit;
  background:rgba(255,255,255,0.8);color:var(--text);
  outline:none;transition:border-color var(--transition),box-shadow var(--transition);
}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,92,138,0.1);}
.form-textarea{height:90px;resize:vertical;}
.form-btn{
  align-self:flex-start;
  background:var(--accent);color:#fff;border:none;
  padding:9px 20px;border-radius:7px;font-size:13px;font-family:inherit;
  font-weight:500;cursor:pointer;transition:opacity var(--transition);
}
.form-btn:hover{opacity:0.85;}

/* z-index management for stacking */
.window.focused{z-index:700;}

/* ── HERO TEXT — letter-by-letter hover ── */
.hero-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-52%);
  text-align:center;
  pointer-events:none;
  z-index:2;
}
.hero-sub{
  font-size:22px;color:var(--text);font-weight:400;
  letter-spacing:0.01em;margin-bottom:6px;
}
.hero-main{
  font-family:'Instrument Serif',serif;
  font-style:italic;
  font-size:clamp(72px,10vw,128px);
  line-height:0.95;
  color:var(--text);
  letter-spacing:-0.02em;
}
.letter{
  display:inline-block;
  transition:
    transform 0.16s cubic-bezier(0.22,1,0.36,1),
    color 0.18s ease,
    text-shadow 0.18s ease;
  transform-origin:center bottom;
  will-change:transform;
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
}
</style>
</head>
<body>

<div class="desktop-grid"></div>

<!-- MENU BAR -->
<header class="menubar">
  <div class="menubar-left">
    <span class="apple-logo" aria-hidden="true">
      <svg viewBox="0 0 14 16" fill="currentColor"><path d="M11.2 8.5c0-2 1.6-3 1.7-3.1-1-1.4-2.4-1.6-2.9-1.6-1.2-.1-2.4.7-3 .7-.6 0-1.6-.7-2.6-.7-1.3 0-2.6.8-3.2 2C-.1 8.3.7 12 2 14c.6.9 1.4 2 2.4 2 1 0 1.3-.6 2.5-.6s1.5.6 2.5.6c1 0 1.7-1 2.3-1.9.5-.8.8-1.6.8-1.7-.1 0-2.3-.9-2.3-3.4v-.5zM9.3 2.4c.5-.6.8-1.5.8-2.4-.7 0-1.6.5-2.2 1.1-.4.5-.8 1.4-.8 2.3.8.1 1.7-.4 2.2-1z"/></svg>
    </span>
    <span class="menu-brand">Zara Khan's Portfolio</span>
    <span class="menu-item" onclick="openWindow('contact')">Contact</span>
    <span class="menu-item" onclick="openWindow('resume')">Resume</span>
  </div>
  <div class="menubar-right">

<script>
/* ═══════════════════════════════════════
   HERO TEXT — split into hoverable letters
═══════════════════════════════════════ */
function splitIntoLetters(el){
  const text=el.textContent;
  el.innerHTML='';
  for(const ch of text){
    if(ch===' '){
      el.appendChild(document.createTextNode(' '));
    }else{
      const span=document.createElement('span');
      span.className='letter';
      span.textContent=ch;
      el.appendChild(span);
    }
  }
}
document.querySelectorAll('[data-split]').forEach(splitIntoLetters);

/* ═══════════════════════════════════════
   HERO TEXT — cursor-radius magnetic effect
   Letters smoothly scale up based on how
   close the cursor is, with falloff — not
   a discrete per-letter hover state.
═══════════════════════════════════════ */
(function(){
  const heroSubLetters=document.querySelectorAll('.hero-sub .letter');
  const heroMainLetters=document.querySelectorAll('.hero-main .letter');
  if(heroSubLetters.length===0 && heroMainLetters.length===0)return;

  // Tuning per text size — bigger text gets a bigger radius & gentler scale
  const CONFIG_SUB ={radius:105, maxScale:1.5, maxLift:-8,  boldAt:0.55};
  const CONFIG_MAIN={radius:170,maxScale:1.28,maxLift:-16, boldAt:0.5};

  let mouseX=-9999,mouseY=-9999;
  let rafPending=false;

  function smoothstep(t){ return t*t*(3-2*t); }

  function applyEffect(span,cfg){
    const rect=span.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    const dx=mouseX-cx, dy=mouseY-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<cfg.radius){
      const t=smoothstep(1-dist/cfg.radius);
      const scale=1+(cfg.maxScale-1)*t;
      const lift=cfg.maxLift*t;
      span.style.transform=`translateY(${lift.toFixed(2)}px) scale(${scale.toFixed(3)})`;
      if(t>cfg.boldAt){
        span.style.color='var(--accent)';
      }else{
        span.style.color='';
      }
    }else{
      span.style.transform='';
      span.style.color='';
    }
  }

  function updateAll(){
    rafPending=false;
    heroSubLetters.forEach(s=>applyEffect(s,CONFIG_SUB));
    heroMainLetters.forEach(s=>applyEffect(s,CONFIG_MAIN));
  }

  function requestUpdate(){
    if(!rafPending){
      rafPending=true;
      requestAnimationFrame(updateAll);
    }
  }

  window.addEventListener('mousemove',e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
    requestUpdate();
  });

  window.addEventListener('mouseleave',()=>{
    mouseX=-9999;mouseY=-9999;
    requestUpdate();
  });
})();

/* ═══════════════════════════════════════
   CLOCK
═══════════════════════════════════════ */
function updateClock(){
  const now=new Date();
  const d=now.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
  const t=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent=d+' '+t;
}
updateClock();setInterval(updateClock,15000);

/* ═══════════════════════════════════════
   DRAGGING + SINGLE-CLICK ACTIVATION
   — icons & sticky note
═══════════════════════════════════════ */
let dragEl=null,dragOffX=0,dragOffY=0;
const DRAG_THRESHOLD=5; // px of movement before it counts as a drag, not a click

function beginDragFrom(startEvent,el){
  // Convert right/bottom-positioned elements to left/top-positioned
  if(el.style.right || el.style.bottom){
    const desktop=document.getElementById('desktop');
    const dr=desktop.getBoundingClientRect();
    const rect=el.getBoundingClientRect();
    el.style.left=(rect.left-dr.left)+'px';
    el.style.top=(rect.top-dr.top)+'px';
    el.style.right='';
    el.style.bottom='';
  }
  dragEl=el;
  el.classList.add('dragging');
  const rect=el.getBoundingClientRect();
  dragOffX=startEvent.clientX-rect.left;
  dragOffY=startEvent.clientY-rect.top;
}

function onDrag(e){
  if(!dragEl)return;
  const desktop=document.getElementById('desktop');
  const dr=desktop.getBoundingClientRect();
  let x=e.clientX-dr.left-dragOffX;
  let y=e.clientY-dr.top-dragOffY;
  x=Math.max(0,Math.min(x,dr.width-dragEl.offsetWidth));
  y=Math.max(0,Math.min(y,dr.height-dragEl.offsetHeight));
  dragEl.style.left=x+'px';
  dragEl.style.top=y+'px';
}

function endDrag(){
  if(dragEl){dragEl.classList.remove('dragging');dragEl=null;}
}

// Attach drag + single-click-to-open to desktop icons & sticky note
document.querySelectorAll('[data-drag="true"]').forEach(el=>{
  el.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    const startX=e.clientX,startY=e.clientY;
    let isDragging=false;

    function onMove(ev){
      if(!isDragging){
        const dx=ev.clientX-startX,dy=ev.clientY-startY;
        if(Math.abs(dx)>DRAG_THRESHOLD||Math.abs(dy)>DRAG_THRESHOLD){
          isDragging=true;
          beginDragFrom(e,el);
        }
      }
      if(isDragging)onDrag(ev);
    }
    function onUp(){
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      if(isDragging){
        endDrag();
      }else{
        // It was a click, not a drag — open whatever this icon points to
        const openIds=el.dataset.open;
        if(openIds){
          openIds.split(',').forEach(id=>openWindow(id.trim()));
        }
      }
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
});

function getWindowPosition(id,cfg){
  // Special case: the About Me pair should sit side-by-side,
  // like a photo with its caption note next to it — never overlapping.
  if(id==='about-photo'){
    return {left:Math.max(80,window.innerWidth*0.15),top:110};
  }
  if(id==='about'){
    const photoWin=openWindows['about-photo'];
    if(photoWin){
      const pLeft=parseInt(photoWin.style.left,10)||0;
      const pTop=parseInt(photoWin.style.top,10)||0;
      const pWidth=photoWin.offsetWidth||360;
      return {left:pLeft+pWidth+46,top:pTop+130};
    }
    return {left:Math.max(80,window.innerWidth*0.15)+430,top:240};
  }

  // Default: cascade each new window a bit further than the last,
  // wrapping back around before it runs off-screen.
  if(cascadeX+cfg.width>window.innerWidth-40 || cascadeY+cfg.height>window.innerHeight-140){
    cascadeX=110;cascadeY=80;
  }
  const pos={left:cascadeX,top:cascadeY};
  cascadeX+=42;cascadeY+=38;
  return pos;
}
let cascadeX=110,cascadeY=80;

function openWindow(id){
  if(openWindows[id]){
    focusWindow(openWindows[id]);
    return;
  }
  const cfg=winConfigs[id];
  if(!cfg)return;

  overlay.classList.add('has-windows');
  zTop+=2;

  const pos=getWindowPosition(id,cfg);
  const w=document.createElement('div');
  w.className='window focused';
  w.style.cssText=`
    width:${cfg.width}px;
    height:${cfg.height}px;
    top:${pos.top}px;
    left:${pos.left}px;
    z-index:${zTop};
  `;

  // Build finder layout vs simple
  if(cfg.finder){
    // Determine active tab key (first item by default)
    const firstTab = cfg.sidebarItems[0].tab || cfg.sidebarItems[0].label;

    const sidebar = cfg.sidebarItems.map(s => {
      const tabKey = s.tab || s.label;
      return `<div class="sidebar-item${s.active ? ' active' : ''}" data-winid="${id}" data-tab="${tabKey}" onclick="switchTab(this)">
        <span class="sidebar-icon">${s.icon}</span>${s.label}
      </div>`;
    }).join('');

    // Build all tab panels; only the first is visible
    const panels = cfg.sidebarItems.map((s, i) => {
      const tabKey = s.tab || s.label;
      return `<div class="win-tab-panel" data-panel="${tabKey}" style="display:${i===0?'block':'none'};height:100%;">${s.render ? s.render() : cfg.render()}</div>`;
    }).join('');

    w.innerHTML = `
      <div class="win-chrome" data-winchrome="${id}">
        <div class="win-btn win-btn-close" onclick="closeWindow('${id}',event)" title="Close"></div>
        <div class="win-btn win-btn-min" title="Minimise"></div>
        <div class="win-btn win-btn-max" title="Maximise"></div>
        <span class="win-title">${cfg.title}</span>
      </div>
      <div class="win-finder">
        <div class="win-sidebar">
          <div class="sidebar-section">Favourites</div>
          ${sidebar}
        </div>
        <div class="win-content">${panels}</div>
      </div>`;
  } else {
    const bodyClass = cfg.flush ? 'win-body-flush' : 'win-body';
    w.innerHTML=`
      <div class="win-chrome" data-winchrome="${id}">
        <div class="win-btn win-btn-close" onclick="closeWindow('${id}',event)" title="Close"></div>
        <div class="win-btn win-btn-min" title="Minimise"></div>
        <div class="win-btn win-btn-max" title="Maximise"></div>
        <span class="win-title">${cfg.title}</span>
      </div>
      <div class="${bodyClass}">${cfg.render()}</div>`;
  }

  overlay.appendChild(w);
  openWindows[id]=w;

  // Focus on click anywhere on window
  w.addEventListener('mousedown',()=>focusWindow(w));

  // Make window draggable by title bar
  const chrome=w.querySelector('.win-chrome');
  chrome.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('win-btn'))return;
    const rect=w.getBoundingClientRect();
    const ox=e.clientX-rect.left,oy=e.clientY-rect.top;
    function onMove(e){
      let x=e.clientX-ox,y=e.clientY-oy;
      x=Math.max(0,Math.min(x,window.innerWidth-w.offsetWidth));
      y=Math.max(28,Math.min(y,window.innerHeight-w.offsetHeight-80));
      w.style.left=x+'px';w.style.top=y+'px';
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',onMove),{once:true});
    e.preventDefault();
  });

  // Update dock dot
  const dBtn=document.getElementById('dockbtn-'+id);
  if(dBtn)dBtn.classList.add('open');
}

function focusWindow(w){
  zTop+=2;w.style.zIndex=zTop;
}

function switchTab(sidebarEl){
  const winId = sidebarEl.dataset.winid;
  const tabKey = sidebarEl.dataset.tab;
  const w = openWindows[winId];
  if(!w) return;
  // Update sidebar active state
  w.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  sidebarEl.classList.add('active');
  // Show correct panel
  w.querySelectorAll('.win-tab-panel').forEach(panel => {
    panel.style.display = panel.dataset.panel === tabKey ? 'block' : 'none';
  });
}

function closeWindow(id,e){
  if(e)e.stopPropagation();
  const w=openWindows[id];
  if(!w)return;
  w.classList.add('closing');
  setTimeout(()=>{
    w.remove();
    delete openWindows[id];
    if(Object.keys(openWindows).length===0)overlay.classList.remove('has-windows');
    const dBtn=document.getElementById('dockbtn-'+id);
    if(dBtn)dBtn.classList.remove('open');
  },160);
}

function closeAllWindows(){
  Object.keys(openWindows).forEach(id=>closeWindow(id));
}

/* Click outside any open window closes it.
   Runs on the CAPTURE phase so it always fires before
   a dock/menu/icon's own click handler — meaning if you
   click something that opens a new window, the old ones
   close first and the new one still opens cleanly. */
document.addEventListener('mousedown',function(e){
  if(Object.keys(openWindows).length===0)return;
  if(e.target.closest('.window'))return;
  closeAllWindows();
},true);

function handleForm(e){
  e.preventDefault();
  const btn=e.target.querySelector('.form-btn');
  btn.textContent='Sent ✓';btn.style.background='#4a8a5c';
  setTimeout(()=>{btn.textContent='Send message';btn.style.background='';e.target.reset();},3000);
}
</script>
